<!DOCTYPE html>
<html>
<head>
    <style>
        .grid {
            display: grid;
            gap: 1px;
            background-color: #444;
            border: 2px solid #333;
            cursor: crosshair;
            user-select: none;
        }
        .cell {
            width: 25px;
            height: 25px;
            background-color: white;
        }
        .cell.wall { background-color: #2c3e50; }
        .cell.start { background-color: #27ae60; }
        .cell.end { background-color: #e74c3c; }
    </style>
</head>
<body>
    <div id="grid-container" class="grid"></div>
    <button id="send-btn" style="margin-top:10px; padding:8px; border-radius:5px; background:#007bff; color:white; border:none; cursor:pointer;">
        Confirmar Mapa
    </button>

    <script>
        // Comunicación con Streamlit
        function sendToStreamlit(data) {
            window.parent.postMessage({
                type: "streamlit:setComponentValue",
                value: data
            }, "*");
        }

        const rows = 20;
        const cols = 20;
        let gridData = Array(rows).fill().map(() => Array(cols).fill(0));
        const container = document.getElementById('grid-container');
        container.style.gridTemplateColumns = `repeat(${cols}, 25px)`;

        // Crear celdas
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.r = r;
                cell.dataset.c = c;

                cell.addEventListener('mousedown', () => {
                    gridData[r][c] = gridData[r][c] === 0 ? 1 : 0;
                    cell.classList.toggle('wall');
                });
                
                // Permitir "pintar" arrastrando
                cell.addEventListener('mouseenter', (e) => {
                    if (e.buttons === 1) {
                        gridData[r][c] = 1;
                        cell.classList.add('wall');
                    }
                });

                container.appendChild(cell);
            }
        }

        document.getElementById('send-btn').onclick = () => sendToStreamlit(gridData);
    </script>
</body>
</html>
