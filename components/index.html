<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --bg-color: #0e1117;
            --cell-size: 25px;
            --wall-color: #2c3e50;
            --path-color: #f1c40f;
            --start-color: #27ae60;
            --end-color: #e74c3c;
            --grid-gap: 1px;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .grid {
            display: grid;
            gap: var(--grid-gap);
            background-color: #444;
            border: 2px solid #333;
            cursor: crosshair;
            user-select: none;
            margin-bottom: 10px;
        }
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background-color: white;
            transition: background-color 0.2s;
        }
        .cell.wall { background-color: var(--wall-color); }
        .cell.start { background-color: var(--start-color); }
        .cell.end { background-color: var(--end-color); }
        .cell.path { 
            background-color: var(--path-color);
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 16px;
            border-radius: 5px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div id="grid-container" class="grid"></div>
    <div class="controls">
        <button id="send-btn">Confirmar Mapa y Enviar</button>
        <button id="clear-btn" style="background:#6c757d;">Limpiar</button>
    </div>

    <script>
        const ROWS = 20;
        const COLS = 20;
        let gridData = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        const container = document.getElementById('grid-container');
        
        function sendToStreamlit(data) {
            window.parent.postMessage({ type: "streamlit:setComponentValue", value: data }, "*");
        }

        function updateHeight() {
            window.parent.postMessage({ type: "streamlit:setFrameHeight", value: document.body.scrollHeight }, "*");
        }

        container.style.gridTemplateColumns = `repeat(${COLS}, var(--cell-size))`;

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (r === 0 && c === 0) cell.classList.add('start');
                if (r === ROWS - 1 && c === COLS - 1) cell.classList.add('end');
                
                cell.dataset.r = r;
                cell.dataset.c = c;

                cell.addEventListener('mousedown', () => toggleWall(r, c, cell));
                cell.addEventListener('mouseenter', (e) => {
                    if (e.buttons === 1) toggleWall(r, c, cell, true);
                });

                container.appendChild(cell);
            }
        }

        function toggleWall(r, c, cell, forceWall = false) {
            if ((r === 0 && c === 0) || (r === ROWS - 1 && c === COLS - 1)) return;
            if (forceWall) {
                gridData[r][c] = 1;
                cell.classList.add('wall');
            } else {
                gridData[r][c] = gridData[r][c] === 0 ? 1 : 0;
                cell.classList.toggle('wall');
            }
        }

        function animatePath(path) {
            document.querySelectorAll('.cell.path').forEach(el => el.classList.remove('path'));
            path.forEach(([r, c], index) => {
                setTimeout(() => {
                    const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
                    if (cell && !cell.classList.contains('start') && !cell.classList.contains('end')) {
                        cell.classList.add('path');
                    }
                }, index * 30);
            });
        }

        window.addEventListener("message", (event) => {
            if (event.data.type === "streamlit:render") {
                const { path } = event.data.args;
                if (path && path.length > 0) animatePath(path);
                updateHeight();
            }
        });

        document.getElementById('send-btn').onclick = () => sendToStreamlit(gridData);
        document.getElementById('clear-btn').onclick = () => {
            gridData = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            document.querySelectorAll('.cell').forEach(el => {
                el.classList.remove('wall', 'path');
                const r = parseInt(el.dataset.r);
                const c = parseInt(el.dataset.c);
                if (r === 0 && c === 0) el.classList.add('start');
                if (r === ROWS - 1 && c === COLS - 1) el.classList.add('end');
            });
            sendToStreamlit(gridData);
        };

        // --- EL ARREGLO CRÍTICO ESTÁ AQUÍ ---
        window.onload = () => {
            // 1. Mandamos el saludo inicial para que Streamlit sepa que existimos
            window.parent.postMessage({
                type: "streamlit:setComponentReady",
                apiVersion: 1
            }, "*");

            // 2. Ajustamos la altura de la ventana
            updateHeight();
        };
    </script>
</body>
</html>
